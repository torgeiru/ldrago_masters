<svg width="680" height="580" viewBox="0 0 680 580" xmlns="http://www.w3.org/2000/svg">
<defs>
  <marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#185FA5" stroke-width="1.5" stroke-linecap="round"/>
  </marker>
  <marker id="g" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#0F6E56" stroke-width="1.5" stroke-linecap="round"/>
  </marker>
</defs>
<rect width="680" height="580" fill="white"/>

<!-- ── USER SPACE ── -->
<rect x="10" y="10" width="658" height="360" rx="16" fill="#EEF4FB" stroke="#85B7EB" stroke-width="1"/>
<text x="30" y="36" font-family="Helvetica" font-size="12" font-weight="bold" fill="#185FA5">User space</text>

  <!-- QEMU Process -->
  <rect x="26" y="48" width="624" height="154" rx="10" fill="#DAEAF8" stroke="#85B7EB" stroke-width="0.8"/>
  <text x="44" y="68" font-family="Helvetica" font-size="10" fill="#185FA5">QEMU process</text>

    <!-- Guest VM -->
    <rect x="42" y="78" width="590" height="108" rx="8" fill="#EEF4FB" stroke="#378ADD" stroke-width="0.8"/>
    <text x="58" y="98" font-family="Helvetica" font-size="10" fill="#185FA5">Guest VM</text>

      <!-- VirtioFS Driver chip -->
      <rect x="58" y="106" width="130" height="56" rx="6" fill="#378ADD" stroke="#185FA5" stroke-width="0.5"/>
      <text x="123" y="128" text-anchor="middle" font-family="Helvetica" font-size="12" font-weight="bold" fill="white">VirtioFS</text>
      <text x="123" y="148" text-anchor="middle" font-family="Helvetica" font-size="9" fill="#E6F1FB">guest driver</text>

      <!-- Shared Memory (guest) chip -->
      <rect x="236" y="106" width="370" height="56" rx="6" fill="#042C53" stroke="#185FA5" stroke-width="0.5"/>
      <text x="421" y="128" text-anchor="middle" font-family="Helvetica" font-size="12" font-weight="bold" fill="white">Shared memory</text>
      <text x="421" y="148" text-anchor="middle" font-family="Helvetica" font-size="9" fill="#B5D4F4">virtqueue ring — mapped into guest + VirtioFSD</text>

      <!-- arrow driver → shared mem -->
      <line x1="188" y1="134" x2="234" y2="134" stroke="#185FA5" stroke-width="1" marker-end="url(#a)"/>

  <!-- VirtioFSD Process -->
  <rect x="26" y="222" width="624" height="132" rx="10" fill="#DAEAF8" stroke="#85B7EB" stroke-width="0.8"/>
  <text x="44" y="242" font-family="Helvetica" font-size="10" fill="#185FA5">VirtioFSD process</text>

    <rect x="42" y="256" width="590" height="82" rx="6" fill="#042C53" stroke="#185FA5" stroke-width="0.5"/>
    <text x="337" y="288" text-anchor="middle" font-family="Helvetica" font-size="12" font-weight="bold" fill="white">Shared memory</text>
    <text x="337" y="308" text-anchor="middle" font-family="Helvetica" font-size="9" fill="#B5D4F4">same physical mapping — daemon reads requests and writes responses directly</text>

<!-- Bidirectional dashed arrows -->
<line x1="380" y1="162" x2="380" y2="254" stroke="#378ADD" stroke-width="1.2" stroke-dasharray="5 3" marker-end="url(#a)"/>
<line x1="420" y1="254" x2="420" y2="162" stroke="#378ADD" stroke-width="1.2" stroke-dasharray="5 3" marker-end="url(#a)"/>

<!-- boundary separator -->
<line x1="10" y1="376" x2="670" y2="376" stroke="#aaa" stroke-width="0.5" stroke-dasharray="5 4"/>

<!-- ── KERNEL SPACE ── -->
<rect x="10" y="380" width="658" height="188" rx="16" fill="#EDF7F3" stroke="#5DCAA5" stroke-width="1"/>
<text x="30" y="404" font-family="Helvetica" font-size="12" font-weight="bold" fill="#0F6E56">Kernel space</text>

  <!-- VFS subsystem -->
  <rect x="26" y="416" width="152" height="136" rx="10" fill="#D4F0E5" stroke="#5DCAA5" stroke-width="0.8"/>
  <text x="102" y="442" text-anchor="middle" font-family="Helvetica" font-size="10" fill="#0F6E56">VFS subsystem</text>
  <rect x="40" y="452" width="124" height="38" rx="6" fill="#1D9E75" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="102" y="475" text-anchor="middle" font-family="Helvetica" font-size="10" font-weight="bold" fill="white">VirtioFS driver</text>

  <!-- File system drivers — three drivers -->
  <rect x="194" y="416" width="188" height="136" rx="10" fill="#D4F0E5" stroke="#5DCAA5" stroke-width="0.8"/>
  <text x="288" y="442" text-anchor="middle" font-family="Helvetica" font-size="10" fill="#0F6E56">File system drivers</text>
  <rect x="208" y="452" width="72" height="38" rx="6" fill="#1D9E75" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="244" y="475" text-anchor="middle" font-family="Helvetica" font-size="10" font-weight="bold" fill="white">EXT4</text>
  <rect x="291" y="452" width="72" height="38" rx="6" fill="#1D9E75" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="327" y="475" text-anchor="middle" font-family="Helvetica" font-size="10" font-weight="bold" fill="white">XFS</text>


  <!-- KVM kernel module -->
  <rect x="480" y="416" width="182" height="136" rx="10" fill="#D4F0E5" stroke="#5DCAA5" stroke-width="0.8"/>
  <text x="571" y="442" text-anchor="middle" font-family="Helvetica" font-size="10" fill="#0F6E56">KVM kernel module</text>
  <rect x="494" y="452" width="154" height="38" rx="6" fill="#1D9E75" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="571" y="475" text-anchor="middle" font-family="Helvetica" font-size="11" font-weight="bold" fill="white">KVM module</text>

  <!-- Connection: VFS subsystem → File system drivers -->
  <line x1="178" y1="484" x2="192" y2="484" stroke="#0F6E56" stroke-width="1.2" marker-end="url(#g)"/>
  <line x1="192" y1="471" x2="178" y2="471" stroke="#0F6E56" stroke-width="1.2" marker-end="url(#g)"/>

</svg>
